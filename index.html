  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --poppy:   #FF4B32;
    --charcoal:#1D1E20;
    --white:   #FFFFFF;
    --mist:    #F3F2F1;
    --zest:    #DEFF00;
    --online-green: #22C55E;
    --online-green-bg: rgba(34,197,94,0.10);
    --online-green-border: rgba(34,197,94,0.26);
  }

  html, body {
    width: 100%; height: 100%;
    margin: 0; padding: 0;
    overflow: hidden;
    background: #000;
    font-family: 'Instrument Sans', system-ui, sans-serif;
  }

  .scale-wrap {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  .page {
    display: flex; flex-direction: column;
    width: 1080px; height: 1920px;
    padding: 52px 48px 44px;
    background: var(--charcoal);
    color: var(--white);
    transform-origin: top left;
    flex-shrink: 0;
  }

  /* Header */
  .header { flex-shrink: 0; margin-bottom: 30px; }
  .header-top {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 20px;
  }
  .header-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .header-date {
    font-family: 'Instrument Sans', sans-serif; font-weight: 400;
    font-size: 16px; color: rgba(255,255,255,0.40);
  }
  .header-updated {
    font-family: 'DM Mono', monospace; font-weight: 400;
    font-size: 12px; letter-spacing: 0.07em; text-transform: uppercase;
    color: rgba(255,255,255,0.24);
  }
  .header-bottom {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.09);
  }
  .header-title {
    font-family: 'Klaviyo Degular', sans-serif; font-weight: 400;
    font-size: 34px; letter-spacing: -0.02em; color: var(--white);
  }
  .online-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 16px; border-radius: 100px;
    background: rgba(255,75,50,0.14); border: 1px solid rgba(255,75,50,0.28);
    font-family: 'DM Mono', monospace; font-weight: 500; font-size: 12px;
    letter-spacing: 0.09em; text-transform: uppercase; color: var(--poppy);
  }
  .badge-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--poppy); animation: pulse 2s infinite;
  }

  /* Ticker */
  .ticker-wrap { flex-shrink: 0; overflow: hidden; margin-bottom: 28px; }
  .ticker-inner {
    display: flex; align-items: center; white-space: nowrap;
    animation: ticker-scroll 28s linear infinite;
  }
  .ticker-item {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 0 18px; height: 32px;
    font-family: 'DM Mono', monospace; font-weight: 500; font-size: 10px;
    letter-spacing: 0.10em; text-transform: uppercase;
    color: var(--charcoal); background: var(--poppy);
  }
  .ticker-flag { width: 12px; height: 12px; flex-shrink: 0; }
  .ticker-logo { height: 13px; width: auto; flex-shrink: 0; }
  .ticker-welcome { gap: 14px; padding: 0 28px; }

  @keyframes ticker-scroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* Grid */
  .hub-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 14px; flex: 1; min-height: 0;
  }

  /* Card */
  .hub-card {
    position: relative; display: flex; flex-direction: column;
    justify-content: space-between; border-radius: 12px; overflow: hidden;
    padding: 0 0 24px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    transition: background 0.5s ease, border-color 0.5s ease;
  }
  .hub-card.online {
    background: rgba(255,75,50,0.09);
    border-color: rgba(255,75,50,0.26);
  }
  .hub-card.coming {
    background: rgba(222,255,0,0.06);
    border-color: rgba(222,255,0,0.20);
  }

  .card-bar {
    height: 4px; width: 100%; flex-shrink: 0;
    background: rgba(255,255,255,0.07);
    transition: background 0.5s ease; margin-bottom: 22px;
  }
  .hub-card.online .card-bar { background: var(--poppy); }
  .hub-card.coming .card-bar { background: var(--zest); }

  .card-body {
    flex: 1; display: flex; flex-direction: column;
    justify-content: space-between; padding: 0 20px;
  }

  .hub-name {
    font-family: 'Klaviyo Degular', sans-serif; font-weight: 600;
    font-size: 28px; letter-spacing: -0.02em; line-height: 1.05;
    color: var(--white); transition: color 0.4s;
  }
  .hub-card.offline .hub-name { color: rgba(255,255,255,0.38); }
  .hub-hq {
    font-family: 'DM Mono', monospace; font-weight: 500; font-size: 9px;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--poppy);
    display: block; margin-top: 3px;
  }

  .hub-time {
    font-family: 'DM Mono', monospace; font-weight: 500; font-size: 52px;
    letter-spacing: -0.04em; line-height: 1; color: var(--white);
    transition: color 0.5s; margin: auto 0; padding: 20px 0 16px;
    display: flex; align-items: baseline; gap: 8px;
  }
  .hub-card.offline .hub-time { color: rgba(255,255,255,0.22); }
  .hub-ampm {
    font-family: 'DM Mono', monospace; font-weight: 400; font-size: 16px;
    letter-spacing: 0.06em; color: rgba(255,255,255,0.45); transition: color 0.5s;
  }
  .hub-card.offline .hub-ampm { color: rgba(255,255,255,0.15); }

  .hub-meta { display: flex; flex-direction: column; gap: 5px; margin-bottom: 16px; }
  .hub-date {
    font-family: 'Instrument Sans', sans-serif; font-weight: 400;
    font-size: 12px; color: rgba(255,255,255,0.35); transition: color 0.4s;
  }
  .hub-card.offline .hub-date { color: rgba(255,255,255,0.18); }
  .hub-tz {
    font-family: 'DM Mono', monospace; font-weight: 400; font-size: 11px;
    letter-spacing: 0.07em; text-transform: uppercase; color: rgba(255,255,255,0.25);
  }

  .progress-wrap {
    width: 100%; height: 2px; background: rgba(255,255,255,0.08);
    border-radius: 1px; overflow: hidden; margin-bottom: 16px;
  }
  .progress-bar {
    height: 100%; border-radius: 1px; background: var(--poppy);
    transition: width 1s linear;
  }
  .hub-card.offline .progress-bar { background: rgba(255,255,255,0.10); }
  .hub-card.coming  .progress-bar { background: var(--zest); }

  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 11px; border-radius: 100px;
    font-family: 'DM Mono', monospace; font-weight: 500; font-size: 10px;
    letter-spacing: 0.09em; text-transform: uppercase; align-self: flex-start;
  }
  .status-pill.online  { background: var(--online-green); color: var(--white); }
  .status-pill.offline { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.32); }
  .status-pill.coming  { background: var(--zest); color: var(--charcoal); }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .online  .status-dot { background: rgba(255,255,255,0.9); animation: pulse 2s infinite; }
  .offline .status-dot { background: rgba(255,255,255,0.25); }
  .coming  .status-dot { background: var(--charcoal); animation: pulse 1.4s infinite; }

  .hub-team {
    font-family: 'Instrument Sans', sans-serif; font-weight: 400; font-size: 11px;
    color: rgba(255,255,255,0.25); overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; margin-top: 10px; transition: color 0.4s;
  }
  .hub-card.offline .hub-team { color: rgba(255,255,255,0.14); }

  /* Footer */
  .footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 20px; flex-shrink: 0;
  }
  .footer-left { font-family: 'Instrument Sans', sans-serif; font-size: 13px; color: rgba(255,255,255,0.20); }
  .footer-right {
    display: flex; align-items: center; gap: 8px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.20);
  }
  .live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--poppy); animation: pulse 2s infinite; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>

const HUBS = [
  { id: 'boston', name: 'Boston',        hq: true,  tz: 'America/New_York',    tzLabel: 'ET',   team: 'Engineering · Product · Marketing'  },
  { id: 'london', name: 'London',        hq: false, tz: 'Europe/London',       tzLabel: 'GMT',  team: 'EMEA Sales · Partnerships · CS'      },
  { id: 'munich', name: 'Munich',        hq: false, tz: 'Europe/Berlin',       tzLabel: 'CET',  team: 'Enterprise Sales · DACH'             },
  { id: 'paris',  name: 'Paris',         hq: false, tz: 'Europe/Paris',        tzLabel: 'CET',  team: 'EMEA Marketing · Agency'             },
  { id: 'dublin', name: 'Dublin',        hq: false, tz: 'Europe/Dublin',       tzLabel: 'IST',  team: 'Customer Success · Support'          },
  { id: 'denver', name: 'Denver',        hq: false, tz: 'America/Denver',      tzLabel: 'MT',   team: 'Engineering · Customer Success'      },
  { id: 'sf',     name: 'San Francisco', hq: false, tz: 'America/Los_Angeles', tzLabel: 'PT',   team: 'Sales · Solutions · Design'          },
  { id: 'sydney', name: 'Sydney',        hq: false, tz: 'Australia/Sydney',    tzLabel: 'AET',  team: 'APAC Sales · Support · Partnerships' },
];

const WORK_START = 9, WORK_END = 17, COMING_WINDOW = 45;

function getHubData(tz) {
  const now = new Date();
  const fmt = opts => new Intl.DateTimeFormat('en-US', { timeZone: tz, ...opts });
  const timeStr = fmt({ hour: '2-digit', minute: '2-digit', hour12: false }).format(now);
  const dateStr = fmt({ weekday: 'short', day: 'numeric', month: 'short' }).format(now);
  const tzAbbr  = fmt({ timeZoneName: 'short' }).formatToParts(now).find(p => p.type === 'timeZoneName')?.value ?? '';
  const h = parseInt(fmt({ hour: 'numeric', hour12: false }).format(now), 10);
  const m = parseInt(fmt({ minute: 'numeric' }).format(now), 10);
  const ampm = h < 12 ? 'AM' : 'PM';
  const min = h * 60 + m;
  const s = WORK_START * 60, e = WORK_END * 60;
  let status, progress = 0;
  if (min >= s && min < e) {
    status = 'online'; progress = (min - s) / (e - s);
  } else if (min >= s - COMING_WINDOW && min < s) {
    status = 'coming'; progress = (min - (s - COMING_WINDOW)) / COMING_WINDOW * 0.04;
  } else {
    status = 'offline';
  }
  return { timeStr, ampm, dateStr, tzAbbr, status, progress };
}

const label = s => s === 'online' ? 'Online' : s === 'coming' ? 'Coming online' : 'Offline';

function renderCards() {
  const grid = document.getElementById('hub-grid');
  grid.innerHTML = '';
  HUBS.forEach(hub => {
    const { timeStr, ampm, dateStr, tzAbbr, status, progress } = getHubData(hub.tz);
    const pct = Math.round(progress * 100);
    const el = document.createElement('div');
    el.className = `hub-card ${status}`;
    el.id = `card-${hub.id}`;
    el.innerHTML = `
      <div class="card-bar"></div>
      <div class="card-body">
        <div>
          <div class="hub-name">${hub.name}</div>
          ${hub.hq ? '<span class="hub-hq">Headquarters</span>' : ''}
        </div>
        <div class="hub-time"><span id="time-${hub.id}">${timeStr}</span><span class="hub-ampm" id="ampm-${hub.id}">${ampm}</span></div>
        <div>
          <div class="hub-meta">
            <span class="hub-date" id="date-${hub.id}">${dateStr}</span>
            <span class="hub-tz" id="tzabbr-${hub.id}">${tzAbbr} · ${hub.tzLabel}</span>
          </div>
          <div class="progress-wrap"><div class="progress-bar" id="prog-${hub.id}" style="width:${pct}%"></div></div>
          <div class="status-pill ${status}" id="pill-${hub.id}"><span class="status-dot"></span>${label(status)}</div>
          <div class="hub-team">${hub.team}</div>
        </div>
      </div>`;
    grid.appendChild(el);
  });
  updateCount();
}

function updateCards() {
  HUBS.forEach(hub => {
    const card = document.getElementById(`card-${hub.id}`);
    if (!card) return;
    const { timeStr, ampm, dateStr, tzAbbr, status, progress } = getHubData(hub.tz);
    card.className = `hub-card ${status}`;
    document.getElementById(`time-${hub.id}`).textContent   = timeStr;
    document.getElementById(`ampm-${hub.id}`).textContent   = ampm;
    document.getElementById(`date-${hub.id}`).textContent   = dateStr;
    document.getElementById(`tzabbr-${hub.id}`).textContent = `${tzAbbr} · ${hub.tzLabel}`;
    document.getElementById(`prog-${hub.id}`).style.width   = Math.round(progress * 100) + '%';
    const pill = document.getElementById(`pill-${hub.id}`);
    pill.className = `status-pill ${status}`;
    pill.innerHTML = `<span class="status-dot"></span>${label(status)}`;
  });
  updateCount();
}

function updateCount() {
  const n = HUBS.filter(h => getHubData(h.tz).status === 'online').length;
  document.getElementById('online-count-text').textContent = `${n} online`;
}

function updateHeader() {
  const now = new Date();
  document.getElementById('header-date').textContent =
    now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  document.getElementById('header-updated').textContent =
    'Updated ' + now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
}

buildTicker(); renderCards(); updateHeader();

function scaleToFit() {
  const page = document.querySelector('.page');
  const scaleX = window.innerWidth  / 1080;
  const scaleY = window.innerHeight / 1920;
  const scale  = Math.min(scaleX, scaleY);
  page.style.transform = 'scale(' + scale + ')';
  const ox = (window.innerWidth  - 1080 * scale) / 2;
  const oy = (window.innerHeight - 1920 * scale) / 2;
  page.style.position = 'absolute';
  page.style.left = ox + 'px';
  page.style.top  = oy + 'px';
}
scaleToFit();
window.addEventListener('resize', scaleToFit);

setInterval(() => { updateCards(); updateHeader(); }, 1000);
setInterval(renderCards, 60000);
</script>
